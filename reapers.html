<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Portal Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS BASE (MANTENIDOS) --- */
        :root { --nordic-gold: #c5a059; }
        body { 
            background: #0a0c10 linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png) fixed center/cover no-repeat;
            color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 40px;
        }
        .main-container {
            max-width: 900px; margin: 150px auto 40px; background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(5px); border: 1px solid var(--nordic-gold); box-shadow: 0 0 50px rgba(0,0,0,0.9); padding: 20px;
        }
        .logo-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding: 30px 0 20px; }
        h1 { font-family: 'Cinzel', serif; color: var(--nordic-gold); font-size: 2.5rem; letter-spacing: 4px; text-transform: uppercase; }

        /* --- TABS --- */
        .tabs-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: -151px; position: relative; z-index: 100; flex-wrap: wrap; }
        .btn-tab { padding: 10px 20px; border: 1px solid var(--nordic-gold); background: #161b22; color: var(--nordic-gold); font-family: 'Cinzel', serif; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-tab.active { background: var(--nordic-gold); color: black; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* --- ESTILOS REPARTO & ACTIVIDAD --- */
        .reparto-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        @media (min-width: 769px) { .reparto-grid { grid-template-columns: repeat(3, 1fr); } }
        .reparto-col { border: 1px solid rgba(197, 160, 89, 0.3); background: rgba(0,0,0,0.4); }
        .reparto-header { background: #9a6a25; color: white; text-align: center; font-family: 'Cinzel', serif; font-size: 11px; padding: 10px; font-weight: bold; }
        .tab-reparto { width: 100%; font-size: 11px; border-collapse: collapse; }
        .tab-reparto th { background: #1e293b; color: var(--nordic-gold); padding: 8px; border: 1px solid #334155; }
        .tab-reparto td { padding: 8px; border: 1px solid rgba(197, 160, 89, 0.1); color: #cbd5e1; }
        .pts-orange { color: #f59e0b; font-weight: bold; text-align: center; }
        .img-mini { width: 32px; height: 32px; border: 1px solid var(--nordic-gold); background: #000; margin: 0 auto; }

        /* --- ESTILOS RANKING ACTIVIDAD --- */
        .ranking-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid rgba(197, 160, 89, 0.1); transition: 0.3s; }
        .ranking-row:hover { background: rgba(197, 160, 89, 0.05); }
        .rank-number { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--nordic-gold); width: 40px; }
        .rank-name { font-weight: bold; flex-grow: 1; text-transform: uppercase; letter-spacing: 1px; }
        .rank-pct { font-family: 'Inter', sans-serif; font-weight: 900; padding: 4px 12px; border-radius: 4px; min-width: 80px; text-align: center; }
        .pct-high { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e; }
        .pct-low { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <div class="tabs-nav">
        <button class="btn-tab active" onclick="verSeccion('almacen', this)">ALMACÉN</button>
        <button class="btn-tab" onclick="verSeccion('reparto', this)">REPARTO</button>
        <button class="btn-tab" onclick="verSeccion('actividad', this)">ACTIVIDAD</button>
    </div>

    <div class="main-container">
        
        <!-- SECCIÓN ALMACÉN -->
        <div id="sec-almacen" class="content-section active">
            <div class="logo-header"><h1>REAPERS ALMACÉN</h1></div>
            <table id="tablaReapers" class="display w-full">
                <thead><tr><th>Icon</th><th>Artículo</th><th>Stock</th></tr></thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- SECCIÓN REPARTO -->
        <div id="sec-reparto" class="content-section">
            <div class="logo-header"><h1>REPARTO DE ITEMS</h1></div>
            <div class="reparto-grid">
                <div class="reparto-col">
                    <div class="reparto-header">DISCORD</div>
                    <table class="tab-reparto"><thead><tr><th colspan="2">ITEM</th><th>PTS</th></tr></thead><tbody id="listaDiscord"></tbody></table>
                </div>
                <div class="reparto-col">
                    <div class="reparto-header">ADMINISTRACIÓN</div>
                    <table class="tab-reparto"><thead><tr><th>ITEM</th><th>PTS</th></tr></thead><tbody id="listaAdmin"></tbody></table>
                </div>
                <div class="reparto-col">
                    <div class="reparto-header">ACTION HOUSE</div>
                    <table class="tab-reparto"><thead><tr><th colspan="2">ITEM</th><th>STOCK</th><th>PTS</th></tr></thead><tbody id="listaAH"></tbody></table>
                </div>
            </div>
        </div>

        <!-- SECCIÓN ACTIVIDAD (NUEVA) -->
        <div id="sec-actividad" class="content-section">
            <div class="logo-header">
                <h1>RANKING DE ACTIVIDAD</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Promedio Global de Temporadas</p>
            </div>
            <div id="listaActividad" class="mt-4">
                <!-- Los rangos se cargarán aquí -->
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        function verSeccion(id, btn) {
            $('.content-section').removeClass('active');
            $(`#sec-${id}`).addClass('active');
            $('.btn-tab').removeClass('active');
            $(btn).addClass('active');
        }

        // CARGAR ALMACÉN (ORIGINAL)
        function cargarAlmacen() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
            Papa.parse(url, { download: true, complete: function(results) {
                let html = '';
                results.data.slice(1).forEach(row => {
                    if (row[0]) html += `<tr><td><img src="${row[32]}" class="item-icon mx-auto"></td><td>${row[0]}</td><td class="text-right stock-number">${row[1]}</td></tr>`;
                });
                $('#cuerpoTabla').html(html);
                $('#tablaReapers').DataTable({ destroy: true, pageLength: 50 });
            }});
        }

        // CARGAR REPARTO (COLUMNAS AC Y AD PARA IMÁGENES)
        function cargarReparto() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=854086504&single=true&output=csv';
            Papa.parse(url, { download: true, complete: function(results) {
                let hD = '', hAdmin = '', hAH = '';
                results.data.slice(4).forEach(r => {
                    if (r[1]) hD += `<tr><td><img src="${r[28]}" class="img-mini"></td><td>${r[1]}</td><td class="pts-orange">${r[3]}</td></tr>`;
                    if (r[4]) hAdmin += `<tr><td>${r[4]}</td><td class="pts-orange">${r[6]}</td></tr>`;
                    if (r[8]) hAH += `<tr><td><img src="${r[29]}" class="img-mini"></td><td>${r[8]}</td><td class="text-center">${r[9]}</td><td class="pts-orange">${r[10]}</td></tr>`;
                });
                $('#listaDiscord').html(hD); $('#listaAdmin').html(hAdmin); $('#listaAH').html(hAH);
            }});
        }

        // CARGAR ACTIVIDAD (NUEVA LÓGICA RANKING)
        function cargarActividad() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=801467735&single=true&output=csv';
            Papa.parse(url, { download: true, complete: function(results) {
                const data = results.data;
                let lista = [];

                // Recorremos desde la fila 5 (índice 4) del Excel
                for (let i = 4; i < data.length; i++) {
                    const nick = data[i][7]; // Columna H[cite: 2]
                    const avg = data[i][16]; // Columna Q (Actividad Media Total)[cite: 2]

                    if (nick && avg && nick !== "Nick") {
                        // Limpiamos el porcentaje para poder ordenar numéricamente
                        const valNum = parseFloat(avg.replace('%', '').replace(',', '.'));
                        lista.push({ nick, avg, valNum });
                    }
                }

                // Ordenar de Mayor a Menor Actividad
                lista.sort((a, b) => b.valNum - a.valNum);

                let htmlRanking = '';
                lista.forEach((user, index) => {
                    const colorClass = user.valNum >= 50 ? 'pct-high' : 'pct-low';
                    htmlRanking += `
                        <div class="ranking-row">
                            <div class="rank-number">#${index + 1}</div>
                            <div class="rank-name">${user.nick}</div>
                            <div class="rank-pct ${colorClass}">${user.avg}</div>
                        </div>`;
                });
                $('#listaActividad').html(htmlRanking);
            }});
        }

        $(document).ready(function() {
            cargarAlmacen();
            cargarReparto();
            cargarActividad();
        });
    </script>
</body>
</html>
