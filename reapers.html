<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Sistema Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --rune-blue: #3b82f6;
            --text-silver: #94a3b8;
        }

        body { 
            background-color: var(--bg-dark);
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.7), rgba(10, 12, 16, 0.9)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }

        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--nordic-gold); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 8px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Menú de Navegación */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
        }

        .nav-btn {
            font-family: 'Cinzel', serif;
            padding: 10px 25px;
            color: var(--text-silver);
            border: 1px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
            letter-spacing: 2px;
        }

        .nav-btn.active {
            color: var(--nordic-gold);
            border: 1px solid var(--nordic-gold);
            background: rgba(197, 160, 89, 0.1);
        }

        /* Tablas */
        .section-view { display: none; }
        .section-view.active { display: block; }

        table.dataTable { background: transparent !important; border: none !important; }
        table.dataTable thead th {
            font-family: 'Cinzel', serif;
            background-color: #0f172a !important; 
            color: var(--nordic-gold) !important;
            border-bottom: 2px solid var(--nordic-gold) !important;
        }

        .item-icon { 
            width: 40px; height: 40px; object-fit: contain; 
            border-radius: 4px; border: 1px solid var(--nordic-gold);
            background: #000;
        }

        .points-badge {
            color: var(--nordic-gold);
            font-weight: bold;
            font-family: 'Cinzel', serif;
        }

        .stock-val { color: #4ade80; font-weight: bold; }

        /* Grid de Puntos */
        .points-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .points-col {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 15px;
            border-radius: 4px;
        }

        .col-title {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            text-align: center;
            border-bottom: 1px solid var(--nordic-gold);
            margin-bottom: 15px;
            padding-bottom: 10px;
            font-size: 0.9rem;
        }

        @media (max-width: 1024px) {
            .points-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="text-center mb-8">
            <h1 class="text-4xl">REAPERS GUILD</h1>
            <p class="text-slate-400 uppercase tracking-widest text-xs">Gestión de Guerra y Suministros</p>
        </div>

        <!-- Menú de Navegación -->
        <div class="nav-menu">
            <div class="nav-btn active" onclick="showSection('almacen', this)">ALMACÉN</div>
            <div class="nav-btn" onclick="showSection('puntos', this)">REPARTO DE ITEMS</div>
        </div>

        <!-- Sección Almacén -->
        <div id="section-almacen" class="section-view active">
            <table id="tablaAlmacen" class="display w-full">
                <thead>
                    <tr>
                        <th style="width: 60px;">Icon</th>
                        <th>Artículo</th>
                        <th class="text-right">Stock</th>
                    </tr>
                </thead>
                <tbody id="cuerpoAlmacen"></tbody>
            </table>
        </div>

        <!-- Sección Puntos -->
        <div id="section-puntos" class="section-view">
            <div class="points-grid">
                <!-- Columna 1: Discord -->
                <div class="points-col">
                    <div class="col-title">DISCORD REPARTO ITEMS</div>
                    <table class="w-full text-sm">
                        <tbody id="cuerpoDiscord"></tbody>
                    </table>
                </div>

                <!-- Columna 2: Administración -->
                <div class="points-col">
                    <div class="col-title">ENTREGA ADMINISTRACIÓN</div>
                    <table class="w-full text-sm">
                        <tbody id="cuerpoAdmin"></tbody>
                    </table>
                </div>

                <!-- Columna 3: Action House -->
                <div class="points-col">
                    <div class="col-title">POR ACTION HOUSE</div>
                    <table class="w-full text-sm">
                        <tbody id="cuerpoAH"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // URLs de las pestañas del Excel
        const urlAlmacen = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
        const urlPuntos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=1587397753&single=true&output=csv';

        function showSection(section, btn) {
            $('.section-view').removeClass('active');
            $(`#section-${section}`).addClass('active');
            $('.nav-btn').removeClass('active');
            $(btn).addClass('active');
        }

        function cargarAlmacen() {
            Papa.parse(urlAlmacen, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    // Localizar cabecera (ajustado según tu script anterior)
                    const headerIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    if (headerIdx !== -1) {
                        rows.slice(headerIdx + 1).forEach(row => {
                            const nombre = row[1];
                            const stock = row[2];
                            const img = row[32] || '';
                            if (nombre && !nombre.includes('Total')) {
                                html += `<tr>
                                    <td class="text-center"><img src="${img}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';"></td>
                                    <td class="font-semibold">${nombre}</td>
                                    <td class="text-right stock-val">${stock}</td>
                                </tr>`;
                            }
                        });
                    }
                    $('#cuerpoAlmacen').html(html);
                    $('#tablaAlmacen').DataTable({ destroy: true, pageLength: 20, language: { search: "BUSCAR:" } });
                }
            });
        }

        function cargarPuntos() {
            Papa.parse(urlPuntos, {
                download: true,
                complete: function(results) {
                    const data = results.data;
                    let htmlDiscord = '', htmlAdmin = '', htmlAH = '';

                    // Empezamos desde la fila 5 (índice 4) según tu captura de pantalla
                    for (let i = 4; i < data.length; i++) {
                        const row = data[i];

                        // Discord (Cols A, B, C) -> Índices 0, 1, 2
                        if (row[1]) {
                            htmlDiscord += `
                                <tr class="border-b border-slate-800">
                                    <td class="py-2"><img src="${row[0]}" class="w-8 h-8 rounded border border-amber-900/50"></td>
                                    <td class="px-2 text-xs">${row[1]}</td>
                                    <td class="text-right points-badge">${row[2]}</td>
                                </tr>`;
                        }

                        // Administración (Cols E, F) -> Índices 4, 5
                        if (row[4]) {
                            htmlAdmin += `
                                <tr class="border-b border-slate-800">
                                    <td class="py-2 text-xs">${row[4]}</td>
                                    <td class="text-right points-badge">${row[5]}</td>
                                </tr>`;
                        }

                        // Action House (Cols H, I, J, K) -> Índices 7, 8, 9, 10
                        if (row[8]) {
                            htmlAH += `
                                <tr class="border-b border-slate-800">
                                    <td class="py-2"><img src="${row[7]}" class="w-8 h-8 rounded border border-amber-900/50"></td>
                                    <td class="px-2 text-xs">${row[8]} <br><span class="text-green-500 text-[10px]">Stock: ${row[9]}</span></td>
                                    <td class="text-right points-badge">${row[10]}</td>
                                </tr>`;
                        }
                    }

                    $('#cuerpoDiscord').html(htmlDiscord);
                    $('#cuerpoAdmin').html(htmlAdmin);
                    $('#cuerpoAH').html(htmlAH);
                }
            });
        }

        $(document).ready(function() {
            cargarAlmacen();
            cargarPuntos();
        });
    </script>
</body>
</html>
