<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS ORIGINALES ALMACÉN (PROHIBIDO TOCAR) --- */
        #tablaReapers_length { margin-left: 15px; }
        #tablaReapers_filter { margin-right: 15px; }
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --rune-blue: #3b82f6;
            --text-silver: #94a3b8;
        }
        body { 
            background-color: #0a0c10;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }
        .main-container {
            max-width: 900px;
            margin: 150px auto 40px;
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--nordic-gold); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 20px;
        }
        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        table.dataTable { border-collapse: collapse !important; border: none !important; margin-top: 20px !important; }
        table.dataTable thead th {
            font-family: 'Cinzel', serif;
            background-color: #0f172a !important; 
            color: var(--nordic-gold) !important;
            text-transform: uppercase; 
            font-size: 0.85rem; 
            padding: 18px !important;
            border-bottom: 2px solid var(--nordic-gold) !important;
            letter-spacing: 1px;
        }
        table.dataTable tbody tr { background-color: transparent !important; border-bottom: 1px solid #334155 !important; }
        table.dataTable td { padding: 15px !important; vertical-align: middle; border: none !important; }
        .item-icon { width: 44px; height: 44px; object-fit: contain; border-radius: 4px; background: #000; border: 1px solid var(--nordic-gold); padding: 2px; }
        .stock-number { color: #4ade80; font-weight: 700; font-size: 1.2rem; }
        .dataTables_filter input { background: #0a0c10; border: 1px solid var(--nordic-gold); border-radius: 4px; padding: 8px 15px; color: white; margin-bottom: 20px; }

        /* --- ESTILOS SECCIÓN REPARTO (NUEVOS E INDEPENDIENTES) --- */
        .nav-tabs {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        .nav-btn {
            padding: 10px 20px;
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid var(--nordic-gold);
            color: var(--nordic-gold);
            font-family: 'Cinzel', serif;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }
        .nav-btn.active { background: var(--nordic-gold); color: black; }
        
        .section-view { display: none; }
        .section-view.active { display: block; }

        .reparto-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
        }
        .reparto-col { border: 1px solid rgba(197, 160, 89, 0.3); background: rgba(0,0,0,0.2); }
        .reparto-title { background: #b45309; color: white; text-align: center; font-family: 'Cinzel', serif; font-size: 11px; padding: 8px; font-weight: bold; }
        
        .tab-data { width: 100%; border-collapse: collapse; font-size: 10px; }
        .tab-data th { background: #1e293b; color: var(--nordic-gold); padding: 5px; border: 1px solid #334155; }
        .tab-data td { padding: 5px; border: 1px solid rgba(197, 160, 89, 0.1); vertical-align: middle; }
        .img-mini { width: 30px; height: 30px; border: 1px solid #444; background: #000; }
        .pts-orange { color: #f59e0b; font-weight: bold; text-align: center; }
        .stock-green { color: #22c55e; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchTab('almacen', this)">Almacén</button>
        <button class="nav-btn" onclick="switchTab('reparto', this)">Reparto de Items</button>
    </div>

    <div class="main-container">
        
        <!-- VISTA ALMACÉN (TU CÓDIGO ORIGINAL) -->
        <div id="view-almacen" class="section-view active">
            <div class="logo-header">
                <h1>REAPERS ALMACÉN</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Registro Oficial de Suministros</p>
            </div>
            <table id="tablaReapers" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 80px;">Icon</th>
                        <th class="text-left">Artículo / Item</th>
                        <th class="text-right">Existencia / Stock</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- VISTA REPARTO (SECCIÓN NUEVA AISLADA) -->
        <div id="view-reparto" class="section-view">
            <div class="logo-header">
                <h1>REPARTO DE ITEMS</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Sistema de Puntuación Oficial</p>
            </div>
            <div class="reparto-grid">
                <!-- Col 1 -->
                <div class="reparto-col">
                    <div class="reparto-title">DISCORD REPARTO ITEMS</div>
                    <table class="tab-data">
                        <thead><tr><th colspan="2">ITEM</th><th>PUNTOS</th></tr></thead>
                        <tbody id="listaDiscord"></tbody>
                    </table>
                </div>
                <!-- Col 2 -->
                <div class="reparto-col">
                    <div class="reparto-title">ENTREGA ADMINISTRACION</div>
                    <table class="tab-data">
                        <thead><tr><th>ITEM</th><th>PUNTOS / UNIDAD</th></tr></thead>
                        <tbody id="listaAdmin"></tbody>
                    </table>
                </div>
                <!-- Col 3 -->
                <div class="reparto-col">
                    <div class="reparto-title">POR ACTION HOUSE</div>
                    <table class="tab-data">
                        <thead><tr><th colspan="2">ITEM</th><th>EN STOCK</th><th>PUNTOS</th></tr></thead>
                        <tbody id="listaAH"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const urlGral = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=';
        const gidAlmacen = '2029872222';
        const gidPuntos = '1587397753';

        function switchTab(view, btn) {
            $('.section-view').removeClass('active');
            $(`#view-${view}`).addClass('active');
            $('.nav-btn').removeClass('active');
            $(btn).addClass('active');
        }

        // FUNCIÓN ALMACÉN (ORIGINAL SIN CAMBIOS)
        function cargarAlmacen() {
            Papa.parse(urlGral + gidAlmacen + '&single=true&output=csv', {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    const headerRowIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    if (headerRowIdx !== -1) {
                        const headers = rows[headerRowIdx];
                        const colItem = headers.findIndex(h => h.includes('Artículo'));
                        const colStock = headers.findIndex(h => h.includes('Existencia'));
                        rows.slice(headerRowIdx + 1).forEach(row => {
                            const nombre = row[colItem] ? row[colItem].trim() : '';
                            const stock = row[colStock] ? row[colStock].trim() : '0';
                            const imgPath = row[32] ? row[32].trim() : ''; 
                            if (nombre && !nombre.includes('Total de puntos')) {
                                html += `<tr><td class="text-center"><img src="${imgPath}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';"></td><td class="font-semibold text-slate-100">${nombre}</td><td class="text-right stock-number">${stock}</td></tr>`;
                            }
                        });
                    }
                    $('#cuerpoTabla').html(html);
                    $('#tablaReapers').DataTable({ destroy: true, pageLength: 50, order: [[2, 'desc']] });
                }
            });
        }

        // FUNCIÓN REPARTO (LOGICA DE COLUMNAS EXCEL)
        function cargarReparto() {
            Papa.parse(urlGral + gidPuntos + '&single=true&output=csv', {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let h1='', h2='', h3='';
                    // Empezamos en la fila 5 (índice 4) del Excel
                    for(let i=4; i<rows.length; i++){
                        const r = rows[i];
                        // Columna Discord (A, B, D)
                        if(r[1]) h1 += `<tr><td width="35"><img src="${r[0]}" class="img-mini"></td><td>${r[1]}</td><td class="pts-orange">${r[3] || ''}</td></tr>`;
                        // Columna Admin (E, G)
                        if(r[4]) h2 += `<tr><td>${r[4]}</td><td class="pts-orange">${r[6] || ''}</td></tr>`;
                        // Columna AH (H, I, J, K)[cite: 2]
                        if(r[8]) h3 += `<tr><td width="35"><img src="${r[7]}" class="img-mini"></td><td>${r[8]}</td><td class="stock-green">${r[9] || '0'}</td><td class="pts-orange">${r[10] || ''}</td></tr>`;
                    }
                    $('#listaDiscord').html(h1);
                    $('#listaAdmin').html(h2);
                    $('#listaAH').html(h3);
                }
            });
        }

        $(document).ready(function() {
            cargarAlmacen();
            cargarReparto();
        });
    </script>
</body>
</html>
