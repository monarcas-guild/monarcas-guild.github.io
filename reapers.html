<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        #tablaReapers_length { margin-left: 15px; }
        #tablaReapers_filter { margin-right: 15px; }
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --rune-blue: #3b82f6;
            --text-silver: #94a3b8;
        }

        body { 
            background-color: #0a0c10;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }

        .floating-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid var(--nordic-gold);
            padding: 10px 25px;
            display: flex;
            gap: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 4px;
        }

        .nav-item {
            font-family: 'Cinzel', serif;
            color: var(--text-silver);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .nav-item:hover, .nav-item.active { color: var(--nordic-gold); }

        .main-container {
            max-width: 1100px;
            margin: 140px auto 40px;
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--nordic-gold); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .section-content { display: none; }
        .section-content.active { display: block; }

        .logo-header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Estilos de Tablas Internas (Puntos) */
        .inner-table { width: 100%; font-size: 11px; border-collapse: collapse; }
        .inner-table thead th {
            background: rgba(197, 160, 89, 0.15);
            color: #fff;
            font-family: 'Cinzel', serif;
            padding: 8px 4px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            text-transform: uppercase;
        }
        .inner-table td {
            padding: 6px 4px;
            border: 1px solid rgba(197, 160, 89, 0.1);
            vertical-align: middle;
        }

        .points-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .points-column {
            background: rgba(10, 12, 16, 0.5);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .col-main-title {
            background: var(--nordic-gold);
            color: #000;
            font-family: 'Cinzel', serif;
            text-align: center;
            font-weight: 900;
            padding: 5px;
            font-size: 11px;
        }

        .item-icon-sm { width: 32px; height: 32px; object-fit: contain; border: 1px solid var(--nordic-gold); background: #000; }
        .pts-text { color: var(--nordic-gold); font-weight: bold; text-align: center; }
        .stock-text { color: #4ade80; font-weight: bold; text-align: center; }

        @media (max-width: 1024px) { .points-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="floating-nav">
        <div class="nav-item active" onclick="showTab('almacen')">Almacén</div>
        <div class="nav-item" onclick="showTab('puntos')">Reparto de Items</div>
    </nav>

    <div class="main-container">
        
        <!-- ALMACÉN -->
        <div id="section-almacen" class="section-content active">
            <div class="logo-header">
                <h1>REAPERS ALMACÉN</h1>
            </div>
            <table id="tablaReapers" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 70px;">Icon</th>
                        <th class="text-left">Artículo / Item</th>
                        <th class="text-right">Existencia</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- PUNTOS -->
        <div id="section-puntos" class="section-content">
            <div class="logo-header">
                <h1>REPARTO DE ITEMS</h1>
            </div>
            
            <div class="points-grid">
                <!-- Columna 1: Discord -->
                <div class="points-column">
                    <div class="col-main-title">DISCORD REPARTO ITEMS</div>
                    <table class="inner-table">
                        <thead>
                            <tr>
                                <th colspan="2">ITEM</th>
                                <th>PUNTOS</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoDiscord"></tbody>
                    </table>
                </div>

                <!-- Columna 2: Admin -->
                <div class="points-column">
                    <div class="col-main-title">ENTREGA ADMINISTRACION</div>
                    <table class="inner-table">
                        <thead>
                            <tr>
                                <th>ITEM</th>
                                <th>PUNTOS</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoAdmin"></tbody>
                    </table>
                </div>

                <!-- Columna 3: Action House -->
                <div class="points-column">
                    <div class="col-main-title">POR ACTION HOUSE</div>
                    <table class="inner-table">
                        <thead>
                            <tr>
                                <th colspan="2">ITEM</th>
                                <th>STOCK</th>
                                <th>PUNTOS</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoAH"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const urlAlmacen = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
        const urlPuntos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=1587397753&single=true&output=csv';

        function showTab(tab) {
            $('.section-content').removeClass('active');
            $(`#section-${tab}`).addClass('active');
            $('.nav-item').removeClass('active');
            $(`.nav-item[onclick="showTab('${tab}')"]`).addClass('active');
        }

        function cargarAlmacen() {
            Papa.parse(urlAlmacen, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    const headerIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    if (headerIdx !== -1) {
                        rows.slice(headerIdx + 1).forEach(row => {
                            if (row[1] && !row[1].includes('Total')) {
                                html += `<tr>
                                    <td class="text-center"><img src="${row[32]}" class="item-icon-sm mx-auto" onerror="this.style.display='none'"></td>
                                    <td class="font-semibold text-slate-100">${row[1]}</td>
                                    <td class="text-right text-[#4ade80] font-bold text-lg">${row[2] || 0}</td>
                                </tr>`;
                            }
                        });
                    }
                    $('#cuerpoTabla').html(html);
                    $('#tablaReapers').DataTable({ destroy: true, pageLength: 20 });
                }
            });
        }

        function cargarReparto() {
    // Usamos el GID 1587397753 que corresponde a la pestaña de PUNTOS[cite: 2]
    const urlPuntos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=1587397753&single=true&output=csv';

    Papa.parse(urlPuntos, {
        download: true,
        complete: function(results) {
            const rows = results.data;
            let htmlDiscord = '', htmlAdmin = '', htmlAH = '';

            // Empezamos en la fila 5 (índice 4) para saltar encabezados del Excel[cite: 2]
            for (let i = 4; i < rows.length; i++) {
                const r = rows[i];

                // 1. DISCORD REPARTO ITEMS (A, B, D)[cite: 2]
                if (r[1] && r[1].trim() !== "") {
                    htmlDiscord += `
                        <tr>
                            <td style="width:40px"><img src="${r[0]}" class="img-mini" onerror="this.style.display='none'"></td>
                            <td class="text-slate-200 uppercase">${r[1]}</td>
                            <td class="pts-orange">${r[3] || '0'}</td>
                        </tr>`;
                }

                // 2. ENTREGA ADMINISTRACION (E, G)[cite: 2]
                if (r[4] && r[4].trim() !== "") {
                    htmlAdmin += `
                        <tr>
                            <td class="text-slate-200 uppercase">${r[4]}</td>
                            <td class="pts-orange">${r[6] || '0'}</td>
                        </tr>`;
                }

                // 3. POR ACTION HOUSE (H, I, J, K)[cite: 2]
                if (r[8] && r[8].trim() !== "") {
                    htmlAH += `
                        <tr>
                            <td style="width:40px"><img src="${r[7]}" class="img-mini" onerror="this.style.display='none'"></td>
                            <td class="text-slate-200 uppercase">${r[8]}</td>
                            <td class="stock-green">${r[9] || '0'}</td>
                            <td class="pts-orange">${r[10] || '0'}</td>
                        </tr>`;
                }
            }

            // Inyectamos los datos en los TBODY correspondientes[cite: 2]
            $('#listaDiscord').html(htmlDiscord || '<tr><td colspan="3" class="text-center py-4">No hay datos</td></tr>');
            $('#listaAdmin').html(htmlAdmin || '<tr><td colspan="2" class="text-center py-4">No hay datos</td></tr>');
            $('#listaAH').html(htmlAH || '<tr><td colspan="4" class="text-center py-4">No hay datos</td></tr>');
        },
        error: function(err) {
            console.error("Error cargando Reparto de Items:", err);
        }
    });
}

        $(document).ready(function() {
            cargarAlmacen();
            cargarPuntos();
        });
    </script>
</body>
</html>
