<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Portal Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --text-silver: #94a3b8;
        }

        body { 
            background-color: #0a0c10;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }

        .main-container {
            max-width: 900px; 
            margin: 150px auto 40px; 
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--nordic-gold); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            padding: 20px;
        }

        /* TABS NAV */
        .tabs-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: -151px;
            position: relative;
            z-index: 100;
        }
        .btn-tab {
            padding: 12px 25px;
            border: 1px solid var(--nordic-gold);
            background: #161b22;
            color: var(--nordic-gold);
            font-family: 'Cinzel', serif;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.3s;
        }
        .btn-tab.active { background: var(--nordic-gold); color: black; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* HEADER */
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 0 20px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
        }
        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* REPARTO GRID RESPONSIVO */
        .reparto-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            margin-top: 20px; 
        }
        @media (min-width: 769px) {
            .reparto-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .reparto-col { border: 1px solid rgba(197, 160, 89, 0.3); background: rgba(0,0,0,0.4); }
        .reparto-header { background: #9a6a25; color: white; text-align: center; font-family: 'Cinzel', serif; font-size: 11px; padding: 10px; font-weight: bold; }
        .tab-reparto { width: 100%; font-size: 11px; border-collapse: collapse; }
        .tab-reparto td { padding: 8px; border: 1px solid rgba(197, 160, 89, 0.1); }
        .img-mini { width: 32px; height: 32px; border: 1px solid var(--nordic-gold); background: #000; display: block; margin: 0 auto; }
        .pts-orange { color: #f59e0b; font-weight: bold; text-align: center; }

        /* RANKING ESTILOS */
        .ranking-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid rgba(197,160,89,0.1); }
        .pct-high { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e; }
        .pct-low { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }

        /* DATATABLES OVERRIDE */
        table.dataTable thead th { font-family: 'Cinzel', serif; background-color: #0f172a !important; color: var(--nordic-gold) !important; border-bottom: 2px solid var(--nordic-gold) !important; }
        .item-icon { width: 44px; height: 44px; border: 1px solid var(--nordic-gold); background: #000; padding: 2px; }
        .stock-number { color: #4ade80; font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>

    <nav class="tabs-nav">
        <button class="btn-tab active" onclick="verSeccion('almacen', this)">ALMACÉN</button>
        <button class="btn-tab" onclick="verSeccion('reparto', this)">REPARTO</button>
        <button class="btn-tab" onclick="verSeccion('actividad', this)">ACTIVIDAD</button>
    </nav>

    <div class="main-container">
        
        <!-- SECCIÓN ALMACÉN -->
        <div id="sec-almacen" class="content-section active">
            <div class="logo-header">
                <h1>REAPERS ALMACÉN</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Registro Oficial de Suministros</p>
            </div>
            <table id="tablaReapers" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 80px;">Icon</th>
                        <th class="text-left">Artículo / Item</th>
                        <th class="text-right">Existencia / Stock</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- SECCIÓN REPARTO -->
        <div id="sec-reparto" class="content-section">
            <div class="logo-header">
                <h1>REPARTO DE ITEMS</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Distribución de Botín</p>
            </div>
            <div class="reparto-grid">
                <div class="reparto-col">
                    <div class="reparto-header">DISCORD</div>
                    <table class="tab-reparto">
                        <thead><tr><th colspan="2">ITEM</th><th>PTS</th></tr></thead>
                        <tbody id="listaDiscord"></tbody>
                    </table>
                </div>
                <div class="reparto-col">
                    <div class="reparto-header">ADMINISTRACIÓN</div>
                    <table class="tab-reparto">
                        <thead><tr><th>ITEM</th><th>PTS</th></tr></thead>
                        <tbody id="listaAdmin"></tbody>
                    </table>
                </div>
                <div class="reparto-col">
                    <div class="reparto-header">ACTION HOUSE</div>
                    <table class="tab-reparto">
                        <thead><tr><th colspan="2">ITEM</th><th>STOCK</th><th>PTS</th></tr></thead>
                        <tbody id="listaAH"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SECCIÓN ACTIVIDAD -->
        <div id="sec-actividad" class="content-section">
            <div class="logo-header">
                <h1>RANKING ACTIVIDAD</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Esfuerzo Bélico de la Hermandad</p>
            </div>
            <div id="listaActividad" class="mt-4"></div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        function verSeccion(id, btn) {
            $('.content-section').removeClass('active');
            $(`#sec-${id}`).addClass('active');
            $('.btn-tab').removeClass('active');
            $(btn).addClass('active');
        }

        // CARGAR ALMACÉN[cite: 4]
        function cargarAlmacen() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
            Papa.parse(url, { download: true, complete: function(results) {
                const rows = results.data;
                let html = '';
                rows.slice(1).forEach(row => {
                    if (row[0]) html += `<tr><td class="text-center"><img src="${row[32]}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';"></td><td class="font-semibold">${row[0]}</td><td class="text-right stock-number">${row[1]}</td></tr>`;
                });
                $('#cuerpoTabla').html(html);
                $('#tablaReapers').DataTable({ destroy: true, pageLength: 50, order: [[2, 'desc']] });
            }});
        }

        // CARGAR REPARTO (Columnas AC=28, AD=29)[cite: 2]
        function cargarReparto() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=854086504&single=true&output=csv';
            Papa.parse(url, { download: true, complete: function(results) {
                let hD = '', hAdmin = '', hAH = '';
                results.data.slice(4).forEach(r => {
                    if (r[1]) hD += `<tr><td><img src="${r[28]}" class="img-mini"></td><td>${r[1]}</td><td class="pts-orange">${r[3]}</td></tr>`;
                    if (r[4]) hAdmin += `<tr><td>${r[4]}</td><td class="pts-orange">${r[6]}</td></tr>`;
                    if (r[8]) hAH += `<tr><td><img src="${r[29]}" class="img-mini"></td><td>${r[8]}</td><td class="text-center">${r[9]}</td><td class="pts-orange">${r[10]}</td></tr>`;
                });
                $('#listaDiscord').html(hD); $('#listaAdmin').html(hAdmin); $('#listaAH').html(hAH);
            }});
        }

        // CARGAR ACTIVIDAD (Ranking Col H y Q)[cite: 2, 3]
        function cargarActividad() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=801467735&single=true&output=csv';
            Papa.parse(url, { download: true, complete: function(results) {
                const data = results.data;
                let lista = [];
                for (let i = 4; i < data.length; i++) {
                    const nick = data[i][7]; // Col H[cite: 2]
                    const avg = data[i][16]; // Col Q[cite: 2]
                    if (nick && avg && nick !== "Nick") {
                        const valNum = parseFloat(avg.replace('%', '').replace(',', '.').trim()) || 0;
                        lista.push({ nick, avg, valNum });
                    }
                }
                lista.sort((a, b) => b.valNum - a.valNum); // Ordenar[cite: 3]
                let html = '';
                lista.forEach((u, i) => {
                    const color = u.valNum >= 50 ? 'pct-high' : 'pct-low';
                    html += `<div class="ranking-row"><div style="font-family:Cinzel,serif;color:#c5a059;width:40px;">#${i+1}</div><div style="flex-grow:1;font-weight:bold;text-transform:uppercase;">${u.nick}</div><div class="${color}" style="padding:4px 12px;border-radius:4px;font-weight:900;min-width:85px;text-align:center;">${u.avg}</div></div>`;
                });
                $('#listaActividad').html(html);
            }});
        }

        $(document).ready(function() {
            cargarAlmacen();
            cargarReparto();
            cargarActividad();
        });
    </script>
</body>
</html>
