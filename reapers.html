<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS ORIGINALES ALMACÉN (NO TOCAR) --- */
        #tablaReapers_length { margin-left: 15px; }
        #tablaReapers_filter { margin-right: 15px; }
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --rune-blue: #3b82f6;
            --text-silver: #94a3b8;
        }
        body { 
            background-color: #0a0c10;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }
        .main-container {
            max-width: 900px;
            margin: 150px auto 40px;
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--nordic-gold); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            padding: 20px;
        }
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 20px;
        }
        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* --- ESTILOS REPARTO --- */
        .reparto-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .reparto-col { border: 1px solid rgba(197, 160, 89, 0.3); background: rgba(0,0,0,0.4); }
        .reparto-header { background: #9a6a25; color: white; text-align: center; font-family: 'Cinzel', serif; font-size: 11px; padding: 10px; font-weight: bold; }
        .tab-reparto { width: 100%; font-size: 11px; border-collapse: collapse; }
        .tab-reparto th { background: #1e293b; color: var(--nordic-gold); padding: 8px; border: 1px solid #334155; }
        .tab-reparto td { padding: 8px; border: 1px solid rgba(197, 160, 89, 0.1); color: #cbd5e1; vertical-align: middle; }
        .img-mini { width: 32px; height: 32px; border: 1px solid var(--nordic-gold); background: #000; display: block; margin: 0 auto; }
        .pts-orange { color: #f59e0b; font-weight: bold; text-align: center; font-size: 13px; }
        .stock-green { color: #22c55e; font-weight: bold; text-align: center; }

        /* Navegación */
        .tabs-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: -151px; position: relative; z-index: 100; }
        .btn-tab { padding: 10px 25px; border: 1px solid var(--nordic-gold); background: #161b22; color: var(--nordic-gold); font-family: 'Cinzel', serif; cursor: pointer; text-transform: uppercase; }
        .btn-tab.active { background: var(--nordic-gold); color: black; }
        .content-section { display: none; }
        .content-section.active { display: block; }



/* --- SECCIÓN REPARTO: ESTILOS RESPONSIVOS --- */
.reparto-grid { 
    display: grid; 
    grid-template-columns: 1fr; /* Una sola columna por defecto (Mobile) */
    gap: 15px; 
    margin-top: 20px; 
    padding: 10px;
}

/* Cambio a 3 columnas solo en pantallas grandes (Desktop) */
@media (min-width: 769px) {
    .reparto-grid { 
        grid-template-columns: repeat(3, 1fr); 
        padding: 20px;
    }
}

.reparto-col { 
    border: 1px solid rgba(197, 160, 89, 0.3); 
    background: rgba(0,0,0,0.4); 
    width: 100%; /* Asegura que ocupe todo el ancho en mobile */
}

.reparto-header { 
    background: #9a6a25; 
    color: white; 
    text-align: center; 
    font-family: 'Cinzel', serif; 
    font-size: 11px; 
    padding: 10px; 
    font-weight: bold; 
}

.tab-reparto { 
    width: 100%; 
    font-size: 11px; 
    border-collapse: collapse; 
}

/* Ajuste de padding para que no se vea apretado en mobile */
.tab-reparto td, .tab-reparto th { 
    padding: 10px 5px; 
}
    </style>
</head>
<body>

    <div class="tabs-nav">
        <button class="btn-tab active" onclick="verSeccion('almacen', this)">ALMACÉN</button>
        <button class="btn-tab" onclick="verSeccion('reparto', this)">REPARTO DE ITEMS</button>
        <button class="btn-tab" onclick="verSeccion('actividad', this)">ACTIVIDAD</button>
    </div>

    <div class="main-container">
        
        <!-- SECCIÓN ALMACÉN (ORIGINAL) -->
        <div id="sec-almacen" class="content-section active">
            <div class="logo-header">
                <h1>REAPERS ALMACÉN</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Registro Oficial de Suministros</p>
            </div>
            <table id="tablaReapers" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 80px;">Icon</th>
                        <th class="text-left">Artículo / Item</th>
                        <th class="text-right">Existencia / Stock</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- SECCIÓN REPARTO (ACTUALIZADA CON TU NUEVO GID) -->
        <div id="sec-reparto" class="content-section">
            <div class="logo-header">
                <h1>REPARTO DE ITEMS</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Sistema de Puntuación Oficial</p>
            </div>
            <div class="reparto-grid">
                <div class="reparto-col">
                    <div class="reparto-header">DISCORD REPARTO ITEMS</div>
                    <table class="tab-reparto">
                        <thead><tr><th colspan="2">ITEM</th><th>PUNTOS</th></tr></thead>
                        <tbody id="listaDiscord"></tbody>
                    </table>
                </div>
                <div class="reparto-col">
                    <div class="reparto-header">ENTREGA ADMINISTRACION</div>
                    <table class="tab-reparto">
                        <thead><tr><th>ITEM</th><th>PUNTOS / UNIDAD</th></tr></thead>
                        <tbody id="listaAdmin"></tbody>
                    </table>
                </div>
                <div class="reparto-col">
                    <div class="reparto-header">POR ACTION HOUSE</div>
                    <table class="tab-reparto">
                        <thead><tr><th colspan="2">ITEM</th><th>STOCK</th><th>PTS</th></tr></thead>
                        <tbody id="listaAH"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SECCIÓN ACTIVIDAD (NUEVA) -->
        <div id="sec-actividad" class="content-section">
            <div class="logo-header">
                <h1>RANKING DE ACTIVIDAD</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Promedio Global de Temporadas</p>
            </div>
            <div id="listaActividad" class="mt-4">
                <!-- Los rangos se cargarán aquí -->
            </div>
        </div>
    
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        function verSeccion(id, btn) {
            $('.content-section').removeClass('active');
            $(`#sec-${id}`).addClass('active');
            $('.btn-tab').removeClass('active');
            $(btn).addClass('active');
        }

        // --- CARGAR ALMACÉN ---
        function cargarAlmacen() {
            const urlAlmacen = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
            Papa.parse(urlAlmacen, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    const headerRowIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    if (headerRowIdx !== -1) {
                        const headers = rows[headerRowIdx];
                        const colItem = headers.findIndex(h => h.includes('Artículo'));
                        const colStock = headers.findIndex(h => h.includes('Existencia'));
                        rows.slice(headerRowIdx + 1).forEach(row => {
                            const nombre = row[colItem] ? row[colItem].trim() : '';
                            const stock = row[colStock] ? row[colStock].trim() : '0';
                            const imgPath = row[32] ? row[32].trim() : ''; 
                            if (nombre && !nombre.includes('Total de puntos')) {
                                html += `<tr><td class="text-center"><img src="${imgPath}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';"></td><td class="font-semibold text-slate-100">${nombre}</td><td class="text-right stock-number">${stock}</td></tr>`;
                            }
                        });
                    }
                    $('#cuerpoTabla').html(html);
                    $('#tablaReapers').DataTable({ destroy: true, pageLength: 50, order: [[2, 'desc']] });
                }
            });
        }

       function cargarReparto() {
    const urlReparto = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=854086504&single=true&output=csv';
    
    Papa.parse(urlReparto, {
        download: true,
        complete: function(results) {
            const rows = results.data;
            let hDiscord = '', hAdmin = '', hAH = '';
            
            // Empezamos en la fila 5 (índice 4)
            for (let i = 4; i < rows.length; i++) {
                const r = rows[i];
                if(!r) continue;

                // 1. DISCORD REPARTO: Nombre en Col B (r[1]), Imagen en Col AC (r[28])
                if (r[1] && r[1].trim() !== "") {
                    const imgLocal = r[28] ? r[28].trim() : '';
                    hDiscord += `
                        <tr>
                            <td style="width:45px">
                                ${imgLocal ? `<img src="${imgLocal}" class="img-mini" onerror="this.src='https://valhalla-rising.com/favicon.ico';">` : ''}
                            </td>
                            <td class="uppercase font-medium">${r[1]}</td>
                            <td class="pts-orange">${r[3] || '0'}</td>
                        </tr>`;
                }

                // 2. ENTREGA ADMINISTRACION: Nombre en Col E (r[4])[cite: 2]
                if (r[4] && r[4].trim() !== "") {
                    hAdmin += `
                        <tr>
                            <td class="uppercase font-medium">${r[4]}</td>
                            <td class="pts-orange">${r[6] || '0'}</td>
                        </tr>`;
                }

                // 3. POR ACTION HOUSE: Nombre en Col I (r[8]), Imagen en Col AD (r[29])[cite: 2]
                if (r[8] && r[8].trim() !== "") {
                    const imgLocalAH = r[29] ? r[29].trim() : '';
                    hAH += `
                        <tr>
                            <td style="width:45px">
                                ${imgLocalAH ? `<img src="${imgLocalAH}" class="img-mini" onerror="this.src='https://valhalla-rising.com/favicon.ico';">` : ''}
                            </td>
                            <td class="uppercase font-medium">${r[8]}</td>
                            <td class="stock-green">${r[9] || '0'}</td>
                            <td class="pts-orange">${r[10] || '0'}</td>
                        </tr>`;
                }
            }
            $('#listaDiscord').html(hDiscord);
            $('#listaAdmin').html(hAdmin);
            $('#listaAH').html(hAH);
        }
    });

    // CARGAR ACTIVIDAD (NUEVA LÓGICA RANKING)
        function cargarActividad() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=801467735&single=true&output=csv';
            Papa.parse(url, { download: true, complete: function(results) {
                const data = results.data;
                let lista = [];

                // Recorremos desde la fila 5 (índice 4) del Excel
                for (let i = 4; i < data.length; i++) {
                    const nick = data[i][7]; // Columna H[cite: 2]
                    const avg = data[i][16]; // Columna Q (Actividad Media Total)[cite: 2]

                    if (nick && avg && nick !== "Nick") {
                        // Limpiamos el porcentaje para poder ordenar numéricamente
                        const valNum = parseFloat(avg.replace('%', '').replace(',', '.'));
                        lista.push({ nick, avg, valNum });
                    }
                }

                // Ordenar de Mayor a Menor Actividad
                lista.sort((a, b) => b.valNum - a.valNum);

                let htmlRanking = '';
                lista.forEach((user, index) => {
                    const colorClass = user.valNum >= 50 ? 'pct-high' : 'pct-low';
                    htmlRanking += `
                        <div class="ranking-row">
                            <div class="rank-number">#${index + 1}</div>
                            <div class="rank-name">${user.nick}</div>
                            <div class="rank-pct ${colorClass}">${user.avg}</div>
                        </div>`;
                });
                $('#listaActividad').html(htmlRanking);
            }});
        }


        $(document).ready(function() {
            cargarAlmacen();
            cargarReparto();
            cargarActividad();
        });
    </script>
</body>
</html>
