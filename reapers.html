<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- SECCIÓN ALMACÉN: PROHIBIDO TOCAR (ESTILOS ORIGINALES) --- */
        #tablaReapers_length { margin-left: 15px; }
        #tablaReapers_filter { margin-right: 15px; }
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --rune-blue: #3b82f6;
            --text-silver: #94a3b8;
        }
        body { 
            background-color: #0a0c10;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }
        .main-container {
            max-width: 900px;
            margin: 150px auto 40px;
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--nordic-gold); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            padding: 20px;
        }
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 20px;
        }
        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        table.dataTable thead th {
            font-family: 'Cinzel', serif;
            background-color: #0f172a !important; 
            color: var(--nordic-gold) !important;
            text-transform: uppercase; 
            font-size: 0.85rem; 
            padding: 18px !important;
            border-bottom: 2px solid var(--nordic-gold) !important;
        }
        .item-icon { width: 44px; height: 44px; object-fit: contain; border-radius: 4px; background: #000; border: 1px solid var(--nordic-gold); padding: 2px; }
        .stock-number { color: #4ade80; font-weight: 700; font-size: 1.2rem; }

        /* --- SECCIÓN REPARTO: ESTILOS --- */
        .reparto-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .reparto-col { border: 1px solid rgba(197, 160, 89, 0.3); background: rgba(0,0,0,0.4); }
        .reparto-header { background: #9a6a25; color: white; text-align: center; font-family: 'Cinzel', serif; font-size: 12px; padding: 10px; font-weight: bold; }
        .tab-reparto { width: 100%; font-size: 11px; border-collapse: collapse; }
        .tab-reparto th { background: #1e293b; color: var(--nordic-gold); padding: 8px; border: 1px solid #334155; text-transform: uppercase; }
        .tab-reparto td { padding: 8px; border: 1px solid rgba(197, 160, 89, 0.1); color: #cbd5e1; }
        .img-mini { width: 32px; height: 32px; border: 1px solid var(--nordic-gold); background: #000; }
        .pts-orange { color: #f59e0b; font-weight: bold; text-align: center; font-size: 13px; }
        .stock-green { color: #22c55e; font-weight: bold; text-align: center; }

        /* Tabs de Navegación */
        .tabs-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: -151px; position: relative; z-index: 100; }
        .btn-tab { padding: 10px 25px; border: 1px solid var(--nordic-gold); background: #161b22; color: var(--nordic-gold); font-family: 'Cinzel', serif; cursor: pointer; }
        .btn-tab.active { background: var(--nordic-gold); color: black; }
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>

    <div class="tabs-nav">
        <button class="btn-tab active" onclick="verSeccion('almacen', this)">ALMACÉN</button>
        <button class="btn-tab" onclick="verSeccion('reparto', this)">REPARTO DE ITEMS</button>
    </div>

    <div class="main-container">
        
        <!-- SECCIÓN ALMACÉN -->
        <div id="sec-almacen" class="content-section active">
            <div class="logo-header">
                <h1>REAPERS ALMACÉN</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Registro Oficial de Suministros</p>
            </div>
            <table id="tablaReapers" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 80px;">Icon</th>
                        <th class="text-left">Artículo / Item</th>
                        <th class="text-right">Existencia / Stock</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- SECCIÓN REPARTO -->
        <div id="sec-reparto" class="content-section">
            <div class="logo-header">
                <h1>REPARTO DE ITEMS</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Sistema de Puntuación Oficial</p>
            </div>
            <div class="reparto-grid">
                <div class="reparto-col">
                    <div class="reparto-header">DISCORD REPARTO ITEMS</div>
                    <table class="tab-reparto">
                        <thead><tr><th colspan="2">ITEM</th><th>PUNTOS</th></tr></thead>
                        <tbody id="listaDiscord"></tbody>
                    </table>
                </div>
                <div class="reparto-col">
                    <div class="reparto-header">ENTREGA ADMINISTRACION</div>
                    <table class="tab-reparto">
                        <thead><tr><th>ITEM</th><th>PUNTOS / UNIDAD</th></tr></thead>
                        <tbody id="listaAdmin"></tbody>
                    </table>
                </div>
                <div class="reparto-col">
                    <div class="reparto-header">POR ACTION HOUSE</div>
                    <table class="tab-reparto">
                        <thead><tr><th colspan="2">ITEM</th><th>STOCK</th><th>PTS</th></tr></thead>
                        <tbody id="listaAH"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        function verSeccion(id, btn) {
            $('.content-section').removeClass('active');
            $(`#sec-${id}`).addClass('active');
            $('.btn-tab').removeClass('active');
            $(btn).addClass('active');
        }

        // --- CARGAR ALMACÉN (TU CÓDIGO ORIGINAL SIN TOCAR) ---
        function cargarAlmacen() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
            Papa.parse(csvUrl, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    const headerRowIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    if (headerRowIdx !== -1) {
                        const headers = rows[headerRowIdx];
                        const colItem = headers.findIndex(h => h.includes('Artículo'));
                        const colStock = headers.findIndex(h => h.includes('Existencia'));
                        rows.slice(headerRowIdx + 1).forEach(row => {
                            const nombre = row[colItem] ? row[colItem].trim() : '';
                            const stock = row[colStock] ? row[colStock].trim() : '0';
                            const imgPath = row[32] ? row[32].trim() : ''; 
                            if (nombre && !nombre.includes('Total de puntos')) {
                                html += `<tr><td class="text-center"><img src="${imgPath}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';"></td><td class="font-semibold text-slate-100">${nombre}</td><td class="text-right stock-number">${stock}</td></tr>`;
                            }
                        });
                    }
                    $('#cuerpoTabla').html(html);
                    $('#tablaReapers').DataTable({ destroy: true, pageLength: 50, order: [[2, 'desc']] });
                }
            });
        }

        // --- CARGAR REPARTO (SOLUCIÓN PARA QUE NO SALGA VACÍO) ---
        function cargarReparto() {
            const urlReparto = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=1587397753&single=true&output=csv';
            Papa.parse(urlReparto, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let hDiscord = '', hAdmin = '', hAH = '';
                    // Empezamos en la fila 5 del Excel (índice 4)[cite: 2]
                    for (let i = 4; i < rows.length; i++) {
                        const r = rows[i];
                        // Discord: Col A (Img), B (Nombre), D (Puntos)[cite: 2]
                        if (r[1]) hDiscord += `<tr><td><img src="${r[0]}" class="img-mini"></td><td>${r[1]}</td><td class="pts-orange">${r[3] || '0'}</td></tr>`;
                        // Admin: Col E (Nombre), G (Puntos)[cite: 2]
                        if (r[4]) hAdmin += `<tr><td>${r[4]}</td><td class="pts-orange">${r[6] || '0'}</td></tr>`;
                        // AH: Col H (Img), I (Nombre), J (Stock), K (Puntos)[cite: 2]
                        if (r[8]) hAH += `<tr><td><img src="${r[7]}" class="img-mini"></td><td>${r[8]}</td><td class="stock-green">${r[9] || '0'}</td><td class="pts-orange">${r[10] || '0'}</td></tr>`;
                    }
                    $('#listaDiscord').html(hDiscord);
                    $('#listaAdmin').html(hAdmin);
                    $('#listaAH').html(hAH);
                }
            });
        }

        $(document).ready(function() {
            cargarAlmacen();
            cargarReparto();
        });
    </script>
</body>
</html>
