<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        #tablaReapers_length { margin-left: 15px; }
        #tablaReapers_filter { margin-right: 15px; }
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --rune-blue: #3b82f6;
            --text-silver: #94a3b8;
        }

        body { 
            background-color: #0a0c10;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }

        /* Menu Flotante con tus estilos */
        .floating-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid var(--nordic-gold);
            padding: 10px 25px;
            display: flex;
            gap: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 4px;
        }

        .nav-item {
            font-family: 'Cinzel', serif;
            color: var(--text-silver);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--nordic-gold);
        }

        .main-container {
            max-width: 1000px;
            margin: 140px auto 40px;
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--nordic-gold); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .section-content { display: none; }
        .section-content.active { display: block; }

        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Estilos de Tabla e Items */
        table.dataTable { border-collapse: collapse !important; border: none !important; }
        table.dataTable thead th {
            font-family: 'Cinzel', serif;
            background-color: #0f172a !important; 
            color: var(--nordic-gold) !important;
            border-bottom: 2px solid var(--nordic-gold) !important;
            padding: 15px !important;
        }

        .item-icon { 
            width: 42px; height: 42px; object-fit: contain; 
            border-radius: 4px; background: #000; 
            border: 1px solid var(--nordic-gold); padding: 2px;
        }

        /* Grid de Puntos estilo Excel */
        .points-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: rgba(197, 160, 89, 0.2);
            margin: 0 20px 30px;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }

        .points-column { background: #161b22; padding: 15px; }
        
        .col-title {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            text-align: center;
            font-size: 0.8rem;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .point-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .item-name-sm { font-size: 10px; text-transform: uppercase; color: #f8fafc; flex: 1; font-weight: 600; }
        .pts-val { font-family: 'Cinzel', serif; color: var(--nordic-gold); font-size: 11px; font-weight: bold; }
        .stock-label { font-size: 9px; color: #4ade80; display: block; }

        @media (max-width: 768px) {
            .points-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav class="floating-nav">
        <div class="nav-item active" onclick="showTab('almacen')">Almacén</div>
        <div class="nav-item" onclick="showTab('puntos')">Reparto de Items</div>
    </nav>

    <div class="main-container">
        
        <!-- SECCION ALMACEN -->
        <div id="section-almacen" class="section-content active">
            <div class="logo-header">
                <h1>REAPERS ALMACÉN</h1>
                <p class="text-slate-400 uppercase tracking-widest text-[10px]">Registro Oficial de Suministros</p>
            </div>
            <table id="tablaReapers" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 70px;">Icon</th>
                        <th class="text-left">Artículo / Item</th>
                        <th class="text-right">Existencia</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- SECCION PUNTOS -->
        <div id="section-puntos" class="section-content">
            <div class="logo-header">
                <h1>REPARTO DE ITEMS</h1>
                <p class="text-slate-400 uppercase tracking-widest text-[10px]">Sistema de Puntuación Oficial</p>
            </div>
            
            <div class="points-grid">
                <!-- Columna 1 -->
                <div class="points-column">
                    <div class="col-title">DISCORD REPARTO ITEMS</div>
                    <div id="contDiscord"></div>
                </div>
                <!-- Columna 2 -->
                <div class="points-column">
                    <div class="col-title">ENTREGA ADMINISTRACION</div>
                    <div id="contAdmin"></div>
                </div>
                <!-- Columna 3 -->
                <div class="points-column">
                    <div class="col-title">POR ACTION HOUSE</div>
                    <div id="contAH"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const urlAlmacen = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
        // URL de la pestaña PUNTOS (gid=1587397753)
        const urlPuntos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=1587397753&single=true&output=csv';

        function showTab(tab) {
            $('.section-content').removeClass('active');
            $(`#section-${tab}`).addClass('active');
            $('.nav-item').removeClass('active');
            $(`.nav-item[onclick="showTab('${tab}')"]`).addClass('active');
        }

        function cargarAlmacen() {
            Papa.parse(urlAlmacen, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    const headerIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    if (headerIdx !== -1) {
                        rows.slice(headerIdx + 1).forEach(row => {
                            if (row[1] && !row[1].includes('Total')) {
                                html += `<tr>
                                    <td class="text-center"><img src="${row[32]}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';"></td>
                                    <td class="font-semibold text-slate-100">${row[1]}</td>
                                    <td class="text-right text-[#4ade80] font-bold text-lg">${row[2] || 0}</td>
                                </tr>`;
                            }
                        });
                    }
                    $('#cuerpoTabla').html(html);
                    $('#tablaReapers').DataTable({ destroy: true, pageLength: 25, order: [[2, 'desc']] });
                }
            });
        }

        function cargarPuntos() {
            Papa.parse(urlPuntos, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let htmlD = '', htmlAdm = '', htmlAH = '';

                    // Empezamos en fila 5 (índice 4) según tu Excel
                    for (let i = 4; i < rows.length; i++) {
                        const r = rows[i];

                        // COL 1: Discord (A: Imagen, B: Item, C: Puntos)
                        if (r[1]) {
                            htmlD += `
                                <div class="point-row">
                                    <img src="${r[0]}" class="w-8 h-8 rounded border border-amber-900/50 object-contain bg-black" onerror="this.style.display='none'">
                                    <div class="item-name-sm">${r[1]}</div>
                                    <div class="pts-val">${r[2]}</div>
                                </div>`;
                        }

                        // COL 2: Admin (E: Item, F: Puntos)
                        if (r[4]) {
                            htmlAdm += `
                                <div class="point-row">
                                    <div class="item-name-sm">${r[4]}</div>
                                    <div class="pts-val">${r[5]}</div>
                                </div>`;
                        }

                        // COL 3: Action House (H: Imagen, I: Item, J: Stock, K: Puntos)
                        if (r[8]) {
                            htmlAH += `
                                <div class="point-row">
                                    <img src="${r[7]}" class="w-8 h-8 rounded border border-amber-900/50 object-contain bg-black" onerror="this.style.display='none'">
                                    <div class="flex-1">
                                        <span class="item-name-sm">${r[8]}</span>
                                        <span class="stock-label">EN STOCK: ${r[9]}</span>
                                    </div>
                                    <div class="pts-val">${r[10]}</div>
                                </div>`;
                        }
                    }
                    $('#contDiscord').html(htmlD);
                    $('#contAdmin').html(htmlAdm);
                    $('#contAH').html(htmlAH);
                }
            });
        }

        $(document).ready(function() {
            cargarAlmacen();
            cargarPuntos();
        });
    </script>
</body>
</html>
