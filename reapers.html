<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILOS ORIGINALES ALMACEN (NO TOCAR) */
        #tablaReapers_length { margin-left: 15px; }
        #tablaReapers_filter { margin-right: 15px; }
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --text-silver: #94a3b8;
        }

        body { 
            background-color: #0a0c10;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }

        .floating-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid var(--nordic-gold);
            padding: 10px 25px;
            display: flex;
            gap: 30px;
            border-radius: 4px;
        }

        .nav-item {
            font-family: 'Cinzel', serif;
            color: var(--text-silver);
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .nav-item.active { color: var(--nordic-gold); }

        .main-container {
            max-width: 1100px;
            margin: 140px auto 40px;
            background: rgba(22, 27, 34, 0.9); 
            border: 1px solid var(--nordic-gold); 
        }

        .section-content { display: none; }
        .section-content.active { display: block; }

        .logo-header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.2rem;
            text-transform: uppercase;
        }

        /* ESTILOS REPARTO DE ITEMS (NUEVO) */
        .points-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .points-column {
            border: 1px solid rgba(197, 160, 89, 0.4);
            background: rgba(0, 0, 0, 0.3);
        }

        .col-header {
            background: #d97706; /* Color naranja/dorado del Excel */
            color: black;
            font-family: 'Cinzel', serif;
            text-align: center;
            font-weight: bold;
            padding: 8px;
            font-size: 12px;
            border-bottom: 1px solid #000;
        }

        .inner-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .inner-table th {
            background: #1e293b;
            color: var(--nordic-gold);
            padding: 6px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            font-family: 'Cinzel', serif;
        }
        .inner-table td {
            padding: 6px;
            border: 1px solid rgba(197, 160, 89, 0.1);
            vertical-align: middle;
        }
        
        .img-item { width: 32px; height: 32px; object-fit: contain; background: black; border: 1px solid #334155; }
        .txt-pts { color: #f59e0b; font-weight: bold; text-align: center; }
        .txt-stock { color: #22c55e; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <nav class="floating-nav">
        <div class="nav-item active" onclick="showTab('almacen')">Almacén</div>
        <div class="nav-item" onclick="showTab('puntos')">Reparto de Items</div>
    </nav>

    <div class="main-container">
        
        <!-- SECCIÓN ALMACÉN (TU ESTRUCTURA ORIGINAL) -->
        <div id="section-almacen" class="section-content active">
            <div class="logo-header">
                <h1>REAPERS ALMACÉN</h1>
            </div>
            <table id="tablaReapers" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 70px;">Icon</th>
                        <th class="text-left">Artículo / Item</th>
                        <th class="text-right">Existencia</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- SECCIÓN REPARTO DE ITEMS -->
        <div id="section-puntos" class="section-content">
            <div class="logo-header">
                <h1>REPARTO DE ITEMS</h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-400">Sistema de Puntuación Oficial</p>
            </div>
            
            <div class="points-grid">
                <!-- Columna 1: Discord -->
                <div class="points-column">
                    <div class="col-header">DISCORD REPARTO ITEMS</div>
                    <table class="inner-table">
                        <thead>
                            <tr>
                                <th colspan="2">ITEM</th>
                                <th>PUNTOS</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoDiscord"></tbody>
                    </table>
                </div>

                <!-- Columna 2: Administración -->
                <div class="points-column">
                    <div class="col-header">ENTREGA ADMINISTRACION</div>
                    <table class="inner-table">
                        <thead>
                            <tr>
                                <th>ITEM</th>
                                <th>PUNTOS / UNIDAD</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoAdmin"></tbody>
                    </table>
                </div>

                <!-- Columna 3: Action House -->
                <div class="points-column">
                    <div class="col-header">POR ACTION HOUSE</div>
                    <table class="inner-table">
                        <thead>
                            <tr>
                                <th colspan="2">ITEM</th>
                                <th>EN STOCK</th>
                                <th>PUNTOS</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoAH"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const urlAlmacen = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
        const urlPuntos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=1587397753&single=true&output=csv';

        function showTab(tab) {
            $('.section-content').removeClass('active');
            $(`#section-${tab}`).addClass('active');
            $('.nav-item').removeClass('active');
            $(`.nav-item`).each(function() {
                if($(this).text().toLowerCase().includes(tab === 'puntos' ? 'reparto' : 'almacén')) {
                    $(this).addClass('active');
                }
            });
        }

        function cargarAlmacen() {
            Papa.parse(urlAlmacen, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    // Usamos la lógica que ya te funcionaba para el almacén
                    for(let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row[1] && !row[1].includes('Total')) {
                            html += `<tr>
                                <td class="text-center"><img src="${row[32]}" class="w-10 h-10 mx-auto object-contain" onerror="this.style.opacity='0'"></td>
                                <td class="font-semibold text-slate-100">${row[1]}</td>
                                <td class="text-right text-[#4ade80] font-bold text-lg">${row[2] || 0}</td>
                            </tr>`;
                        }
                    }
                    $('#cuerpoTabla').html(html);
                    $('#tablaReapers').DataTable({ destroy: true, pageLength: 20 });
                }
            });
        }

        function cargarPuntos() {
            Papa.parse(urlPuntos, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let htmlD = '', htmlAdm = '', htmlAH = '';

                    // Empezamos en la fila 5 (índice 4) del Excel
                    for (let i = 4; i < rows.length; i++) {
                        const r = rows[i];

                        // Col 1: Discord (A, B, D) -> Imagen, Nombre, Puntos
                        if (r[1] && r[1].trim() !== "") {
                            htmlD += `<tr>
                                <td style="width:35px"><img src="${r[0]}" class="img-item" onerror="this.style.display='none'"></td>
                                <td class="text-slate-200 uppercase">${r[1]}</td>
                                <td class="txt-pts">${r[3] || ''}</td>
                            </tr>`;
                        }

                        // Col 2: Admin (E, G) -> Nombre, Puntos[cite: 2]
                        if (r[4] && r[4].trim() !== "") {
                            htmlAdm += `<tr>
                                <td class="text-slate-200 uppercase">${r[4]}</td>
                                <td class="txt-pts">${r[6] || ''}</td>
                            </tr>`;
                        }

                        // Col 3: AH (H, I, J, K) -> Imagen, Nombre, Stock, Puntos[cite: 2]
                        if (r[8] && r[8].trim() !== "") {
                            htmlAH += `<tr>
                                <td style="width:35px"><img src="${r[7]}" class="img-item" onerror="this.style.display='none'"></td>
                                <td class="text-slate-200 uppercase">${r[8]}</td>
                                <td class="txt-stock">${r[9] || '0'}</td>
                                <td class="txt-pts">${r[10] || ''}</td>
                            </tr>`;
                        }
                    }
                    $('#cuerpoDiscord').html(htmlD);
                    $('#cuerpoAdmin').html(htmlAdm);
                    $('#cuerpoAH').html(htmlAH);
                }
            });
        }

        $(document).ready(function() {
            cargarAlmacen();
            cargarPuntos();
        });
    </script>
</body>
</html>
