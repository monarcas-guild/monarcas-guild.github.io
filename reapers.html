<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Gestión de Gremio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --card: #1e293b; }
        body { background-color: var(--dark); color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .dataTables_wrapper { color: #e2e8f0 !important; padding: 10px; }
        table.dataTable tbody tr { background-color: var(--card) !important; color: #e2e8f0; border-bottom: 1px solid #334155; }
        .dataTables_filter input { background: #334155; border: 1px solid var(--primary); border-radius: 4px; padding: 4px; color: white; }
        .nav-btn { @apply px-6 py-3 rounded-lg font-bold transition-all flex items-center gap-2; }
        .active-tab { @apply bg-blue-600 text-white shadow-lg shadow-blue-900/50; }
        .inactive-tab { @apply bg-slate-800 text-gray-400 hover:bg-slate-700; }
        .loading { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4">

    <header class="max-w-6xl mx-auto text-center my-8">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-700 mb-2">REAPERS</h1>
        <div class="flex flex-wrap justify-center gap-4 mt-8">
            <button onclick="showTab('almacen')" id="btn-almacen" class="nav-btn active-tab"><i class="fas fa-warehouse"></i> Almacén</button>
            <button onclick="showTab('puntos')" id="btn-puntos" class="nav-btn inactive-tab"><i class="fas fa-gem"></i> Tienda de Puntos</button>
            <button onclick="showTab('actividad')" id="btn-actividad" class="nav-btn inactive-tab"><i class="fas fa-chart-line"></i> Ranking de Actividad</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <!-- SECCIÓN ALMACÉN -->
        <div id="almacen" class="tab-content">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-blue-400"><i class="fas fa-boxes"></i> Inventario Actual y Salidas</h2>
                <table id="tablaAlmacen" class="display w-full border border-slate-700">
                    <thead>
                        <tr class="bg-slate-800 text-left">
                            <th>Ítem / Descripción</th>
                            <th>Existencia</th>
                            <th>Jefe (Boss)</th>
                            <th>Último Receptor</th>
                        </tr>
                    </thead>
                    <tbody id="dataAlmacen"></tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN PUNTOS -->
        <div id="puntos" class="tab-content hidden">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-2xl font-bold mb-6 text-blue-400"><i class="fas fa-tags"></i> Listado de Precios</h2>
                <div id="gridPuntos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <!-- Cards se generan aquí -->
                </div>
            </div>
        </div>

        <!-- SECCIÓN ACTIVIDAD -->
        <div id="actividad" class="tab-content hidden">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-2xl font-bold mb-6 text-green-400"><i class="fas fa-trophy"></i> Ranking de Asistencia Media</h2>
                <table id="tablaRanking" class="display w-full border border-slate-700">
                    <thead>
                        <tr class="bg-slate-800 text-left">
                            <th>Rango</th>
                            <th>Usuario Discord</th>
                            <th>Asistencia Media %</th>
                        </tr>
                    </thead>
                    <tbody id="dataActividad"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    const csvUrls = {
        almacen: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv',
        puntos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=854086504&single=true&output=csv',
        actividad: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=801467735&single=true&output=csv'
    };

    // Función para manejar errores de carga local
    const handleEmpty = (id) => $(id).html('<tr><td colspan="4" class="text-center p-4">Cargando datos desde Google Sheets... si tarda, verifica tu conexión.</td></tr>');

    // --- PROCESAR ALMACÉN ---
    Papa.parse(csvUrls.almacen, {
        download: true,
        header: false, // Cambiamos a false para saltar filas vacías manualmente
        complete: function(results) {
            const data = results.data;
            let html = '';
            // Buscamos la fila que contiene los encabezados reales
            const startRow = data.findIndex(row => row.some(cell => cell.includes('EXISTENCIA') || cell.includes('DESCRIPCIÓN')));
            
            if (startRow !== -1) {
                const headers = data[startRow].map(h => h.trim().toUpperCase());
                const rows = data.slice(startRow + 1);

                rows.forEach(row => {
                    const desc = row[headers.indexOf('DESCRIPCIÓN')] || row[headers.indexOf('ITEMS')];
                    const stock = parseInt(row[headers.indexOf('EXISTENCIA')] || 0);
                    const boss = row[headers.indexOf('BOSS')] || '-';
                    const receptor = row[headers.indexOf('A QUIEN SE ENTREGO')] || row[headers.indexOf('ENTREGADO A')] || '-';

                    if (desc && desc.length > 2) {
                        html += `<tr>
                            <td class="font-semibold">${desc}</td>
                            <td class="${stock > 0 ? 'text-green-400 font-bold' : 'text-gray-500'}">${stock}</td>
                            <td>${boss}</td>
                            <td><span class="text-blue-300 text-sm">${receptor}</span></td>
                        </tr>`;
                    }
                });
            }
            $('#dataAlmacen').html(html || '<tr><td colspan="4">No se encontraron datos en Almacén</td></tr>');
            $('#tablaAlmacen').DataTable({ language: { search: "🔍 Buscar ítem:" } });
        }
    });

    // --- PROCESAR PUNTOS ---
    Papa.parse(csvUrls.puntos, {
        download: true,
        header: false,
        complete: function(results) {
            const data = results.data;
            let html = '';
            // Buscar cabecera de puntos
            const startRow = data.findIndex(row => row.some(cell => cell.includes('PUNTOS')));
            
            if (startRow !== -1) {
                const headers = data[startRow].map(h => h.trim().toUpperCase());
                const rows = data.slice(startRow + 1);

                rows.forEach(row => {
                    const item = row[0]; // Usualmente la primera columna
                    const val = row[headers.indexOf('PUNTOS')];
                    if (item && val && !isNaN(val)) {
                        html += `
                        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                            <h3 class="text-xs text-blue-400 font-bold uppercase mb-1">Ítem de Canje</h3>
                            <p class="text-md font-medium leading-tight h-10 overflow-hidden">${item}</p>
                            <p class="text-2xl font-black text-white mt-2">${val} <span class="text-xs text-gray-400 font-normal">PTS</span></p>
                        </div>`;
                    }
                });
            }
            $('#gridPuntos').html(html || '<p class="col-span-full text-center">No se encontraron puntos</p>');
        }
    });

    // --- PROCESAR ACTIVIDAD ---
    Papa.parse(csvUrls.actividad, {
        download: true,
        header: false,
        complete: function(results) {
            const data = results.data;
            let html = '';
            const startRow = data.findIndex(row => row.some(cell => cell.includes('DISCORD')));

            if (startRow !== -1) {
                const headers = data[startRow].map(h => h.trim().toUpperCase());
                let rows = data.slice(startRow + 1)
                    .filter(row => row[headers.indexOf('DISCORD')] && row[headers.indexOf('ACTIVIDAD MEDIA TOTAL')]);

                // Ordenar por ranking real
                rows.sort((a, b) => {
                    let valA = parseFloat(a[headers.indexOf('ACTIVIDAD MEDIA TOTAL')].replace('%', '')) || 0;
                    let valB = parseFloat(b[headers.indexOf('ACTIVIDAD MEDIA TOTAL')].replace('%', '')) || 0;
                    return valB - valA;
                });

                rows.forEach((row, index) => {
                    const user = row[headers.indexOf('DISCORD')];
                    const media = row[headers.indexOf('ACTIVIDAD MEDIA TOTAL')];
                    const numMedia = parseFloat(media.replace('%', ''));
                    const color = numMedia >= 80 ? 'text-green-400' : (numMedia >= 50 ? 'text-yellow-400' : 'text-red-400');

                    html += `<tr>
                        <td class="text-gray-500 font-bold">#${index + 1}</td>
                        <td class="font-bold">${user}</td>
                        <td class="${color} font-mono font-bold">${media}</td>
                    </tr>`;
                });
            }
            $('#dataActividad').html(html);
            $('#tablaRanking').DataTable({ order: [[2, 'desc']], language: { search: "🔍 Buscar jugador:" } });
        }
    });

    function showTab(tabId) {
        $('.tab-content').addClass('hidden');
        $(`#${tabId}`).removeClass('hidden');
        $('.nav-btn').removeClass('active-tab').addClass('inactive-tab');
        $(`#btn-${tabId}`).removeClass('inactive-tab').addClass('active-tab');
    }
</script>
</body>
</html>
