<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #0b1120; --card: #161f32; --accent: #3b82f6; }
        body { background-color: var(--dark); color: #f1f5f9; font-family: sans-serif; }
        
        /* Estilos para que el buscador se vea bien */
        .dataTables_wrapper .dataTables_filter { margin-bottom: 20px; }
        .dataTables_wrapper .dataTables_filter input {
            background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            padding: 8px; color: white; margin-left: 10px; width: 250px;
        }
        .dataTables_wrapper .dataTables_length select { background: #1e293b; color: white; border-radius: 4px; padding: 4px; }
        
        /* Estilo de la tabla */
        table.dataTable { border: none !important; border-collapse: collapse !important; }
        table.dataTable tbody tr { background-color: transparent !important; border-bottom: 1px solid #1e293b !important; }
        table.dataTable thead th { background-color: #1e293b !important; color: #60a5fa !important; border: none !important; padding: 15px !important; }
        table.dataTable td { padding: 12px !important; border: none !important; }

        .item-img { width: 35px; height: 35px; object-fit: contain; border-radius: 4px; background: #0b1120; padding: 2px; }
        .stock-badge { color: #4ade80; font-weight: 900; font-size: 1.1rem; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-5xl mx-auto">
        <!-- Logo/Título -->
        <h1 class="text-center text-4xl font-black text-blue-500 italic mb-8">REAPERS</h1>

        <!-- Botones Navegación -->
        <div class="flex justify-center gap-4 mb-8">
            <button class="bg-blue-600 px-6 py-2 rounded-md font-bold flex items-center gap-2"><i class="fas fa-warehouse"></i> Almacén</button>
            <button class="bg-slate-800 text-slate-400 px-6 py-2 rounded-md font-bold">Tienda</button>
            <button class="bg-slate-800 text-slate-400 px-6 py-2 rounded-md font-bold">Actividad</button>
        </div>

        <!-- Sección Almacén -->
        <div class="bg-slate-900/40 p-6 rounded-xl border border-slate-800">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fas fa-boxes text-blue-400"></i> Inventario Actual y Salidas
            </h2>

            <table id="tablaAlmacen" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 60px;">Imagen</th>
                        <th>Ítem / Descripción</th>
                        <th class="text-right">Existencia</th>
                    </tr>
                </thead>
                <tbody id="dataAlmacen">
                    <!-- JS cargará los datos aquí -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const urlAlmacen = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';

        function cargarAlmacen() {
            Papa.parse(urlAlmacen, {
                download: true,
                complete: function(results) {
                    const data = results.data;
                    let html = '';
                    
                    // Encontrar cabecera
                    const headerIdx = data.findIndex(row => row.some(c => c && c.toString().toUpperCase().includes('ARTÍCULO')));
                    
                    if (headerIdx !== -1) {
                        const headers = data[headerIdx].map(h => h ? h.trim().toUpperCase() : '');
                        const colNombre = headers.findIndex(h => h.includes('ARTÍCULO'));
                        const colStock = headers.findIndex(h => h.includes('EXISTENCIA'));
                        
                        const filas = data.slice(headerIdx + 1);

filas.forEach((row, index) => {
    const nombre = row[colNombre];
    const stockNum = row[colStock] ? row[colStock].toString().replace(/[^0-9]/g, '') : '0';
    const stock = parseInt(stockNum) || 0;

    // --- LÓGICA PARA LA COLUMNA AB ---
    // Usamos el índice 27 para la columna AB
    let imgUrl = row[27] ? row[27].trim() : ''; 
    
    // Si la imagen no está en la 27, probamos a ver si está en la columna siguiente 
    // a veces Google añade columnas vacías al exportar.
    if (!imgUrl.startsWith('http') && row[28]) {
        imgUrl = row[28].trim();
    }

    if (nombre && stock > 0) {
        const esImagen = imgUrl && imgUrl.startsWith('http');
        
        // Debug opcional: Descomenta la línea de abajo para ver en la consola qué lee de Diamantes
        // if(nombre.includes("Diamantes")) console.log("Link detectado para Diamantes:", imgUrl);

        html += `<tr>
            <td class="text-center">
                ${esImagen ? 
                    `<img src="${imgUrl}" class="item-img mx-auto" style="width:35px; height:35px;" onerror="this.src='https://valhalla-rising.com/favicon.ico'">` : 
                    `<div class="w-8 h-8 bg-slate-800 rounded mx-auto flex items-center justify-center">
                        <i class="fas fa-box text-slate-600 text-xs"></i>
                    </div>`}
            </td>
            <td class="font-bold text-slate-200">${nombre}</td>
            <td class="text-right stock-badge">${stock.toLocaleString()}</td>
        </tr>`;
    }
});
                    }

                    // Insertar HTML
                    $('#dataAlmacen').html(html);

                    // Inicializar DataTable (Solo 3 columnas)
                    $('#tablaAlmacen').DataTable({
                        pageLength: 200, // 200 por defecto
                        destroy: true,   // Evita el error de reinicialización
                        order: [[2, 'desc']], // Ordenar por cantidad
                        language: {
                            search: "Buscar ítem:",
                            lengthMenu: "Mostrar _MENU_ items",
                            info: "Mostrando _TOTAL_ ítems con stock"
                        },
                        columnDefs: [
                            { targets: 0, orderable: false } // No ordenar por la imagen
                        ]
                    });
                }
            });
        }

        $(document).ready(function() {
            cargarAlmacen();
        });
    </script>
</body>
</html>
