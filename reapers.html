<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        #tablaReapers_length { margin-left: 15px; }
        #tablaReapers_filter { margin-right: 15px; }
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --rune-blue: #3b82f6;
            --text-silver: #94a3b8;
        }

        body { 
            background-color: #0a0c10;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 40px;
        }

        /* --- NUEVO MENU FLOTANTE --- */
        .floating-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid var(--nordic-gold);
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .nav-item {
            font-family: 'Cinzel', serif;
            color: var(--text-silver);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--nordic-gold);
            text-shadow: 0 0 8px rgba(197, 160, 89, 0.5);
        }

        /* --- CONTENEDORES --- */
        .main-container {
            max-width: 1000px;
            margin: 150px auto 40px;
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--nordic-gold); 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            padding-bottom: 20px;
        }

        .section-content { display: none; }
        .section-content.active { display: block; }

        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Tablas */
        table.dataTable { border-collapse: collapse !important; border: none !important; margin-top: 20px !important; }
        table.dataTable thead th {
            font-family: 'Cinzel', serif;
            background-color: #0f172a !important; 
            color: var(--nordic-gold) !important;
            text-transform: uppercase; 
            font-size: 0.85rem; 
            padding: 18px !important;
            border-bottom: 2px solid var(--nordic-gold) !important;
        }

        table.dataTable tbody tr { background-color: transparent !important; border-bottom: 1px solid #334155 !important; }
        table.dataTable td { padding: 15px !important; vertical-align: middle; border: none !important; }

        .item-icon { 
            width: 44px; height: 44px; object-fit: contain; 
            border-radius: 4px; background: #000; 
            border: 1px solid var(--nordic-gold); padding: 2px;
        }

        .stock-number { 
            color: #4ade80; font-weight: 700; font-size: 1.2rem; 
            text-shadow: 0 0 5px rgba(74, 222, 128, 0.2);
        }

        /* Grid de Puntos */
        .points-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--nordic-gold);
            margin: 20px;
            border: 1px solid var(--nordic-gold);
        }

        .points-column { background: var(--panel-dark); padding: 15px; }
        .col-header {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            text-align: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            .points-grid { grid-template-columns: 1fr; }
            .main-container { margin: 100px 10px 40px; }
        }
    </style>
</head>
<body>

    <nav class="floating-nav">
        <div class="nav-item active" onclick="switchTab('almacen')">Almacén</div>
        <div class="nav-item" onclick="switchTab('puntos')">Reparto de Items</div>
    </nav>

    <div class="main-container">
        
        <!-- SECCION ALMACEN -->
        <div id="almacen" class="section-content active">
            <div class="logo-header">
                <h1>REAPERS ALMACÉN</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Registro Oficial de Suministros</p>
            </div>
            <table id="tablaReapers" class="display w-full">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 80px;">Icon</th>
                        <th class="text-left">Artículo / Item</th>
                        <th class="text-right">Existencia / Stock</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <!-- SECCION PUNTOS -->
        <div id="puntos" class="section-content">
            <div class="logo-header">
                <h1>REPARTO DE ITEMS</h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs">Sistema de puntuación oficial</p>
            </div>
            
            <div class="points-grid">
                <!-- Col 1 -->
                <div class="points-column">
                    <div class="col-header">DISCORD REPARTO ITEMS</div>
                    <div id="listaDiscord" class="space-y-2"></div>
                </div>
                <!-- Col 2 -->
                <div class="points-column">
                    <div class="col-header">ENTREGA ADMINISTRACION</div>
                    <div id="listaAdmin" class="space-y-2"></div>
                </div>
                <!-- Col 3 -->
                <div class="points-column">
                    <div class="col-header">POR ACTION HOUSE</div>
                    <div id="listaAH" class="space-y-2"></div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const urlAlmacen = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
        const urlPuntos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=854086504&single=true&output=csv';

        function switchTab(id) {
            $('.section-content').removeClass('active');
            $(`#${id}`).addClass('active');
            $('.nav-item').removeClass('active');
            $(`.nav-item[onclick="switchTab('${id}')"]`).addClass('active');
        }

        function cargarAlmacen() {
            Papa.parse(urlAlmacen, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    const headerRowIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    if (headerRowIdx !== -1) {
                        const headers = rows[headerRowIdx];
                        const colItem = headers.findIndex(h => h.includes('Artículo'));
                        const colStock = headers.findIndex(h => h.includes('Existencia'));
                        rows.slice(headerRowIdx + 1).forEach(row => {
                            const nombre = row[colItem]?.trim();
                            if (nombre && !nombre.includes('Total')) {
                                html += `<tr>
                                    <td class="text-center"><img src="${row[32]}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';"></td>
                                    <td class="font-semibold text-slate-100">${nombre}</td>
                                    <td class="text-right stock-number">${row[colStock] || 0}</td>
                                </tr>`;
                            }
                        });
                    }
                    $('#cuerpoTabla').html(html);
                    $('#tablaReapers').DataTable({ destroy: true, pageLength: 50, order: [[2, 'desc']] });
                }
            });
        }

        function cargarPuntos() {
            Papa.parse(urlPuntos, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let htmlDisc = '', htmlAdm = '', htmlAH = '';

                    // Empezamos lectura desde fila 5 (índice 4)
                    for(let i = 4; i < rows.length; i++) {
                        const r = rows[i];
                        
                        // Discord (Cols A, B, C) -> indices 0,1,2
                        if(r[1]) {
                            htmlDisc += `<div class="flex items-center gap-2 border-b border-slate-800 py-1">
                                <img src="${r[0]}" class="w-8 h-8 border border-amber-600/30">
                                <span class="text-[10px] flex-1">${r[1]}</span>
                                <span class="text-amber-500 font-bold text-xs">${r[2]}</span>
                            </div>`;
                        }

                        // Admin (Cols E, F) -> indices 4,5
                        if(r[4]) {
                            htmlAdm += `<div class="flex items-center gap-2 border-b border-slate-800 py-1">
                                <span class="text-[10px] flex-1">${r[4]}</span>
                                <span class="text-amber-500 font-bold text-xs">${r[5]}</span>
                            </div>`;
                        }

                        // Action House (Cols H, I, J, K) -> indices 7,8,9,10
                        if(r[8]) {
                            htmlAH += `<div class="flex items-center gap-2 border-b border-slate-800 py-1">
                                <img src="${r[7]}" class="w-8 h-8 border border-amber-600/30">
                                <div class="flex-1">
                                    <div class="text-[10px] leading-tight">${r[8]}</div>
                                    <div class="text-[9px] text-green-500">Stock: ${r[9]}</div>
                                </div>
                                <span class="text-amber-500 font-bold text-xs">${r[10]}</span>
                            </div>`;
                        }
                    }
                    $('#listaDiscord').html(htmlDisc);
                    $('#listaAdmin').html(htmlAdm);
                    $('#listaAH').html(htmlAH);
                }
            });
        }

        $(document).ready(function() {
            cargarAlmacen();
            cargarPuntos();
        });
    </script>
</body>
</html>
