<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAPERS - Almacén Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-dark: #0a0c10; 
            --panel-dark: #161b22; 
            --nordic-gold: #c5a059; 
            --rune-blue: #3b82f6;
            --text-silver: #94a3b8;
        }


body { 
    background-color: #0a0c10;
    background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.6), rgba(10, 12, 16, 0.8)), url(https://i.imgur.com/xk5mqt2.png);
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: #f8fafc;
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding-bottom: 40px;
}

/* Ajuste opcional para que el contenedor no tape los laterales importantes */
.main-container {
    max-width: 900px; /* Reducimos un poco el ancho para ver más fondo a los lados */
    margin: 150px auto 40px; /* Bajamos un poco la tabla para que se vea el logo del fondo */
    background: rgba(22, 27, 34, 0.9); 
    backdrop-filter: blur(5px);
    border: 1px solid var(--nordic-gold); 
    box-shadow: 0 0 50px rgba(0,0,0,0.9);
}

        /* Sección del Logo */
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 20px;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.5));
            object-fit: contain;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--nordic-gold);
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Estilo de Tabla Nórdica */
        table.dataTable { border-collapse: collapse !important; border: none !important; margin-top: 20px !important; }
        
        table.dataTable thead th {
            font-family: 'Cinzel', serif;
            background-color: #0f172a !important; 
            color: var(--nordic-gold) !important;
            text-transform: uppercase; 
            font-size: 0.85rem; 
            padding: 18px !important;
            border-bottom: 2px solid var(--nordic-gold) !important;
            letter-spacing: 1px;
        }

        table.dataTable tbody tr { 
            background-color: transparent !important; 
            border-bottom: 1px solid #334155 !important; 
        }

        table.dataTable tbody tr:hover { 
            background-color: rgba(197, 160, 89, 0.05) !important; 
        }

        table.dataTable td { 
            padding: 15px !important; 
            vertical-align: middle; 
            border: none !important; 
        }

        /* Iconos de items */
        .item-icon { 
            width: 44px; height: 44px; object-fit: contain; 
            border-radius: 4px; 
            background: #000; 
            border: 1px solid var(--nordic-gold);
            padding: 2px;
        }

        .stock-number { 
            color: #4ade80; 
            font-weight: 700; 
            font-size: 1.2rem; 
            font-family: 'Inter', sans-serif;
            text-shadow: 0 0 5px rgba(74, 222, 128, 0.2);
        }

        /* Buscador personalizado */
        .dataTables_filter input {
            background: #0a0c10; 
            border: 1px solid var(--nordic-gold); 
            border-radius: 4px;
            padding: 8px 15px; 
            color: white; 
            outline: none; 
            margin-bottom: 20px;
            font-family: 'Inter', sans-serif;
        }

        .dataTables_info, .dataTables_paginate {
            color: var(--text-silver) !important;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            .main-container { margin: 10px; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-header">
            <img src="https://i.ibb.co/L6VvC6y/reapers-logo.png" class="logo-img" alt="REAPERS LOGO">
            <h1>REAPERS ALMACÉN</h1>
            <p class="text-slate-400 uppercase tracking-widest text-xs">Skål! - Registro Oficial de Suministros</p>
        </div>

        <table id="tablaReapers" class="display w-full">
            <thead>
                <tr>
                    <th class="text-center" style="width: 80px;">Runa</th>
                    <th class="text-left">Artículo / Item</th>
                    <th class="text-right">Existencia / Stock</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';

        function cargarDatos() {
            Papa.parse(csvUrl, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    
                    const headerRowIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    
                    if (headerRowIdx !== -1) {
                        const headers = rows[headerRowIdx];
                        const colItem = headers.findIndex(h => h.includes('Artículo'));
                        const colStock = headers.findIndex(h => h.includes('Existencia'));

                        rows.slice(headerRowIdx + 1).forEach(row => {
                            const nombre = row[colItem] ? row[colItem].trim() : '';
                            const stock = row[colStock] ? row[colStock].trim() : '0';
                            const imgPath = row[32] ? row[32].trim() : ''; 

                            if (nombre && nombre !== "" && !nombre.includes('Total de puntos')) {
                                html += `
                                    <tr>
                                        <td class="text-center">
                                            <img src="${imgPath}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';">
                                        </td>
                                        <td class="font-semibold text-slate-100">${nombre}</td>
                                        <td class="text-right stock-number">${stock}</td>
                                    </tr>`;
                            }
                        });
                    }

                    $('#cuerpoTabla').html(html);
                    
                    $('#tablaReapers').DataTable({
                        destroy: true,
                        pageLength: 50,
                        order: [[2, 'desc']], 
                        language: {
                            search: "BUSCAR EN EL TESORO:",
                            info: "Mostrando _TOTAL_ artículos de guerra",
                            zeroRecords: "No se han encontrado suministros",
                            paginate: {
                                next: "Siguiente",
                                previous: "Anterior"
                            }
                        }
                    });
                }
            });
        }

        $(document).ready(function() {
            cargarDatos();
        });
    </script>
</body>
</html>
